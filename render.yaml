services:
  - type: web
    name: ivr-backend
    runtime: node
    buildCommand: NODE_OPTIONS=--max-old-space-size=512 npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: NOTES_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
